name: Update Notes Index

on:
  push:
    branches: [main]
    paths:
      - "notes/**.md"

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate notes/index.json
        run: python3 .github/scripts/build_index.py

      - name: Commit updated index (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/index.json
          if git diff --cached --quiet; then
            echo "No changes to index.json — skipping commit."
          else
            git commit -m "chore: regenerate notes/index.json [skip ci]"
            git push
          fi
