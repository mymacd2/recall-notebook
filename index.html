<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall Notebook</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="site-title">Recall Notebook</span>
      <nav>
        <button id="btn-daily" class="nav-btn active" title="Same card each day">Daily</button>
        <button id="btn-random" class="nav-btn" title="Random card">Random</button>
        <button id="btn-browse" class="nav-btn" title="Browse all notes">Browse</button>
      </nav>
    </div>
  </header>

  <main id="app">
    <p class="loading">Loading...</p>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
